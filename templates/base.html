<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="static/style.css" />
    <title>Gig team</title>

    <style>
      :root {
        --bg-page: #f7fbf9;
        --header-glass: rgba(255, 255, 255, 0.92);
        --accent: #000000;
        --accent-2: #000000;
        --text-strong: #07121a;
        --muted: #6b7784;
        --card-shadow: 0 14px 40px rgba(8, 24, 16, 0.06);
      }

      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial;
        background: var(--bg-page);
        color: var(--text-strong);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Sticky glass header */
      header.app-header {
        width: 100%;
        background: var(--header-glass);
        backdrop-filter: blur(6px) saturate(120%);
        box-shadow: 0 6px 18px rgba(8, 20, 12, 0.05);
        border-bottom: 1px solid rgba(12, 20, 16, 0.03);
        position: sticky;
        top: 0;
        z-index: 60;
      }

      .nav-inner {
        max-width: 1120px;
        margin: 0 auto;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      /* Brand */
      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        text-decoration: none;
        color: var(--text-strong);
      }
      .brand .mark {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        display: inline-grid;
        place-items: center;
        background: linear-gradient(
          135deg,
          rgba(31, 163, 90, 0.1),
          rgba(15, 122, 60, 0.06)
        );
        border: 1px solid rgba(15, 122, 60, 0.06);
      }
      .brand .mark .leaf {
        width: 16px;
        height: 16px;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        border-radius: 4px;
        transform: rotate(-18deg);
      }
      .brand h1 {
        font-size: 1.05rem;
        margin: 0;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      .brand p {
        margin: 0;
        font-size: 0.78rem;
        color: var(--muted);
        line-height: 1;
      }

      /* Home CTA */
      .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
        border-radius: 999px;
        border: none;
        font-weight: 700;
        color: white;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        box-shadow: 0 12px 34px rgba(31, 151, 86, 0.16);
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        text-decoration: none;
      }
      .btn-home:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 48px rgba(31, 151, 86, 0.22);
      }
      .btn-home:focus {
        outline: 3px solid rgba(31, 163, 90, 0.14);
        outline-offset: 3px;
      }

      /* main content wrapper */
      main.content {
        max-width: 1120px;
        margin: 28px auto;
        padding: 0 20px 48px;
      }

      /* small screen */
      @media (max-width: 720px) {
        .nav-inner {
          padding: 10px 14px;
        }
        .brand h1 {
          font-size: 0.95rem;
        }
        .brand .mark {
          width: 40px;
          height: 40px;
        }
      }
    </style>
  </head>

  <body>
    <header class="app-header" role="banner">
      <div class="nav-inner">
        <a class="brand" href="/" aria-label="Moon Farm Company home">
          <div>
            <h1><img src="../static/images/logo.png" alt="logo" /></h1>
          </div>
        </a>

        <a href="/" class="btn-home" title="Go home">Go Home</a>
      </div>
    </header>

    <main class="content" role="main">{% block body %}{% endblock body %}</main>

    <!-- Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
